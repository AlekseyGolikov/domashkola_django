{% load static %}
<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{{ title }}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <link rel="shortcut icon" type="image/png" href="{% static 'img/icons/favicon.svg' %}">
        <link rel="stylesheet" type="text/css" href="{% static 'css/custom.css' %}">
    </head>
    <body class="container">

        <header class="header border-bottom py-2">
            <!--Основное меню-->  
                {% include 'domashkola/menu.html' %}
            <!--Выплывающее боковое меню-->
                {% include 'domashkola/menu_side.html' %}

        </header>

        <div class="content">
            <!--Контент-->
            {% block content %}
                {% include 'domashkola/index.html' %}
            {% endblock content %}
        </div>


        <!-- Здесь подразумевается место для содержимого -->
        <footer class="footer">
            <p class="text-center text-body-secondary border-top py-2">&copy; 2025 Домашняя школа</p>
        </footer>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        <script type="text/javascript">

        </script>
    </body>
</html>
