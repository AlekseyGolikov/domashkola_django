        <script type="text/javascript">
            const collapsibleMenu = document.querySelector('#accordionMenu');
            let stack = [];
            let last_id_before_hide = '';

            collapsibleMenu.addEventListener('shown.bs.collapse', (e) => {
                stack.push(e.target.id);
                last_id_before_hide = '#' + stack[stack.length-1];
                document.querySelector('#stack').textContent = 'stack: ' + stack;
                document.querySelector('#last_id').textContent = 'last_id_before_hide: ' + last_id_before_hide;
                
                // document.querySelector('#parentNode').textContent = 'parentNode: ' + document.querySelector(last_id_before_hide).parentElement.className;
            });

            collapsibleMenu.addEventListener('hidden.bs.collapse', (e) => {
                let id = '#' + stack.pop();
                document.querySelector('#id').textContent = 'id: ' + id;
                let collapseEl = new bootstrap.Collapse(id, {toggle: false});
                collapseEl.hide();
                document.querySelector('#stack').textContent = stack;
            });
